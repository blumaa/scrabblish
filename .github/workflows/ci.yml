name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: TypeScript check
        run: bunx tsc -b --noEmit

      - name: Lint
        run: bunx eslint src/ --max-warnings=0

      - name: Unit tests
        run: bunx vitest run

